<!doctype html>
<meta charset="utf-8">
<title>OpenGL FBO browser test: running</title>
<canvas id="v86gl_canvas" width="64" height="64"></canvas>
<pre id="result">running</pre>
<script src="../libglwasm/gl4es.js?v=fbo-formats-20260716"></script>
<script>
(async () => {
    "use strict";

    const GL_FRAMEBUFFER = 0x8D40;
    const GL_RENDERBUFFER = 0x8D41;
    const GL_COLOR_ATTACHMENT0 = 0x8CE0;
    const GL_DEPTH_ATTACHMENT = 0x8D00;
    const GL_STENCIL_ATTACHMENT = 0x8D20;
    const GL_FRAMEBUFFER_COMPLETE = 0x8CD5;
    const GL_RGBA8 = 0x8058;
    const GL_RGB8 = 0x8051;
    const GL_RGBA4 = 0x8056;
    const GL_RGB5_A1 = 0x8057;
    const GL_RGB565 = 0x8D62;
    const GL_RGB10 = 0x8052;
    const GL_RGBA16 = 0x805B;
    const GL_SRGB8_ALPHA8 = 0x8C43;
    const GL_DEPTH24_STENCIL8 = 0x88F0;
    const GL_MAX_RENDERBUFFER_SIZE = 0x84E8;
    const GL_COLOR_BUFFER_BIT = 0x4000;
    const GL_DEPTH_BUFFER_BIT = 0x0100;
    const GL_STENCIL_BUFFER_BIT = 0x0400;
    const GL_RGBA = 0x1908;
    const GL_UNSIGNED_BYTE = 0x1401;
    const module = await createV86GL4ES({
        canvas: document.getElementById("v86gl_canvas"),
        locateFile(path) {
            return `../libglwasm/${path}?v=fbo-formats-20260716`;
        },
    });

    function namePtr(name) {
        const ptr = module._malloc(4);
        new DataView(module.HEAPU8.buffer).setUint32(ptr, name, true);
        return ptr;
    }

    function errorHex() {
        return `0x${module._v86gl_glQueryError().toString(16)}`;
    }

    function assertNoError(label) {
        const error = module._v86gl_glQueryError();
        if (error) throw new Error(`${label}: 0x${error.toString(16)}`);
    }

    module._v86glMakeCurrent(1, 0, 0, 64, 64);
    while (module._v86gl_glQueryError()) {}

    const limitPtr = module._malloc(4);
    if (!module._v86gl_glQueryInteger(GL_MAX_RENDERBUFFER_SIZE, limitPtr)) {
        throw new Error("renderbuffer limit query failed");
    }
    const maxRenderbufferSize = new DataView(module.HEAPU8.buffer).getInt32(limitPtr, true);
    if (maxRenderbufferSize < 64) throw new Error(`bad renderbuffer limit ${maxRenderbufferSize}`);
    assertNoError("renderbuffer limit");

    module._v86gl_glGenFramebuffersMapped(1, namePtr(41));
    assertNoError("gen framebuffer");
    module._v86gl_glGenRenderbuffersMapped(1, namePtr(51));
    assertNoError("gen color renderbuffer");
    module._v86gl_glGenRenderbuffersMapped(1, namePtr(52));
    assertNoError("gen depth renderbuffer");
    module._v86gl_glBindFramebufferMapped(GL_FRAMEBUFFER, 41);
    assertNoError("bind framebuffer");
    module._v86gl_glBindRenderbufferMapped(GL_RENDERBUFFER, 51);
    assertNoError("bind color renderbuffer");
    const colorFormats = [
        GL_RGBA8, GL_RGB8, GL_RGBA4, GL_RGB5_A1, GL_RGB565,
        GL_RGB10, GL_RGBA16, GL_SRGB8_ALPHA8,
    ];
    for (let formatIndex = 0; formatIndex < colorFormats.length; formatIndex++) {
        const format = colorFormats[formatIndex];
        module._v86gl_glRenderbufferStorageMapped(GL_RENDERBUFFER, format, 64, 64);
        const error = module._v86gl_glQueryError();
        if (error) throw new Error(`renderbuffer format 0x${format.toString(16)}: 0x${error.toString(16)}`);
        if (!formatIndex) {
            module._v86gl_glFramebufferRenderbufferMapped(
                GL_FRAMEBUFFER, GL_COLOR_ATTACHMENT0, GL_RENDERBUFFER, 51);
            assertNoError("attach color renderbuffer");
        }
        const status = module._v86gl_glCheckFramebufferStatusMapped(GL_FRAMEBUFFER);
        if (status !== GL_FRAMEBUFFER_COMPLETE) {
            throw new Error(`format 0x${format.toString(16)} status 0x${status.toString(16)}`);
        }
    }

    module._v86gl_glBindRenderbufferMapped(GL_RENDERBUFFER, 52);
    module._v86gl_glRenderbufferStorageMapped(
        GL_RENDERBUFFER, GL_DEPTH24_STENCIL8, 64, 64);
    module._v86gl_glFramebufferRenderbufferMapped(
        GL_FRAMEBUFFER, GL_DEPTH_ATTACHMENT, GL_RENDERBUFFER, 52);
    module._v86gl_glFramebufferRenderbufferMapped(
        GL_FRAMEBUFFER, GL_STENCIL_ATTACHMENT, GL_RENDERBUFFER, 52);
    if (module._v86gl_glQueryError()) {
        throw new Error(`packed depth/stencil setup failed: ${errorHex()}`);
    }
    const packedStatus = module._v86gl_glCheckFramebufferStatusMapped(GL_FRAMEBUFFER);
    if (packedStatus !== GL_FRAMEBUFFER_COMPLETE) {
        throw new Error(`packed FBO status 0x${packedStatus.toString(16)}`);
    }

    module._v86gl_glViewport(0, 0, 64, 64);
    module._v86gl_glClearColor(0.8, 0.15, 0.65, 1);
    module._v86gl_glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT | GL_STENCIL_BUFFER_BIT);
    module._v86gl_glFinish();
    const pixelPtr = module._malloc(4);
    if (!module._v86gl_glReadPixels(
            32, 32, 1, 1, GL_RGBA, GL_UNSIGNED_BYTE, pixelPtr)) {
        throw new Error("FBO readback failed");
    }
    const pixel = Array.from(module.HEAPU8.subarray(pixelPtr, pixelPtr + 4));
    if (pixel[0] < 150 || pixel[2] < 120 || pixel[3] < 240) {
        throw new Error(`FBO pixel mismatch ${pixel.join(",")}`);
    }

    module._v86gl_glBindFramebufferMapped(GL_FRAMEBUFFER, 0);
    module._v86gl_glDeleteRenderbuffersMapped(1, namePtr(51));
    module._v86gl_glDeleteRenderbuffersMapped(1, namePtr(52));
    module._v86gl_glDeleteFramebuffersMapped(1, namePtr(41));

    document.title = "OpenGL FBO browser test: PASS";
    document.getElementById("result").textContent =
        `PASS max=${maxRenderbufferSize} pixel=${pixel.join(",")} formats=${colorFormats.length}`;
})().catch(error => {
    document.title = "OpenGL FBO browser test: FAIL";
    document.getElementById("result").textContent = `FAIL ${error.stack || error}`;
    throw error;
});
</script>
